<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Depreciation Determiner</title>
  <link rel="stylesheet" href="style.css">
  </head>
  <body>
    
    <h1>Auto Depreciation Determiner</h1>

    <label for="make">Make:</label>
    <input list="makes" id="make" placeholder="Select make" onchange="loadModels()">
    <datalist id="makes"></datalist>

  
    <br><br>
    
    <label for="model">Model:</label>
    <input list="models" id="model" placeholder="Select make first" disabled>
    <datalist id="models"></datalist>

    <br><br>
    
    <label for="year">Year:</label>
    <input list="years" id="year" placeholder="Select model first" disabled>
    <datalist id="years"></datalist>

    <br><br>

    <label for="trim">Trim:</label>
    <input list="trims" id="trim" placeholder="Select year first" disabled>
    <datalist id="trims"></datalist>

     




<script src="main.js"></script>

    
  </body>
  </html>
